name: Test valkey-operator chart

on:
  push:
    branches: ["**"]
    paths:
      - "valkey-operator/**"
      - ".github/workflows/test-operator.yml"
  pull_request:
    branches: ["**"]
    paths:
      - "valkey-operator/**"
      - ".github/workflows/test-operator.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: helm-operator-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.19.4

      - name: Lint chart
        run: helm lint ./valkey-operator

  template:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        kube: ["1.34.1","1.33.5","1.32.9","1.31.13","1.30.4"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.19.4

      - name: Render manifests (helm template)
        run: |
          out="/tmp/valkey-operator-k${{ matrix.kube }}.yaml"
          helm template valkey-operator-tmpl ./valkey-operator \
            --kube-version "${{ matrix.kube }}" \
            > "$out"
          echo "Rendered -> $out"

      - name: Upload rendered manifests
        uses: actions/upload-artifact@v4
        with:
          name: valkey-operator-template-k${{ matrix.kube }}
          path: /tmp/valkey-operator-*.yaml
          if-no-files-found: error
