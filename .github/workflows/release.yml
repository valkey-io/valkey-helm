name: Release Charts

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'valkey/Chart.yaml'
      - 'valkey-operator/Chart.yaml'

jobs:
  check-version-change:
    runs-on: ubuntu-latest
    outputs:
      version_changed: ${{ steps.check.outputs.version_changed }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2  # Need at least 2 commits to compare

      - name: Check if version changed
        id: check
        run: |
          version_changed=false

          for chart in valkey valkey-operator; do
            CURRENT_VERSION=$(grep '^version:' ${chart}/Chart.yaml | awk '{print $2}')
            PREVIOUS_VERSION=$(git show HEAD~1:${chart}/Chart.yaml 2>/dev/null | grep '^version:' | awk '{print $2}')

            echo "${chart}: current=${CURRENT_VERSION} previous=${PREVIOUS_VERSION}"

            if [ "$CURRENT_VERSION" != "$PREVIOUS_VERSION" ]; then
              echo "Version changed for ${chart}: ${PREVIOUS_VERSION} -> ${CURRENT_VERSION}"
              version_changed=true
            fi
          done

          echo "version_changed=${version_changed}" >> $GITHUB_OUTPUT

  release:
    needs: check-version-change
    if: needs.check-version-change.outputs.version_changed == 'true' || github.event_name == 'workflow_dispatch'
    permissions:
      contents: write
      packages: write
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure Git
        run: |
          git config user.name "$GITHUB_ACTOR"
          git config user.email "$GITHUB_ACTOR@users.noreply.github.com"

      - name: Run chart-releaser
        uses: helm/chart-releaser-action@v1.7.0
        with:
          charts_dir: .
        env:
          CR_TOKEN: "${{ secrets.GITHUB_TOKEN }}"
          CR_GENERATE_RELEASE_NOTES: true

      - name: Push charts to GHCR
        run: |
          shopt -s nullglob
          repo=$(echo "${GITHUB_REPOSITORY}" | tr '[:upper:]' '[:lower:]')
          echo "${GITHUB_TOKEN}" | helm registry login ghcr.io/${repo} --username ${GITHUB_ACTOR} --password-stdin
          for pkg in .cr-release-packages/*; do
            if [ -z "${pkg:-}" ]; then
              break
            fi
            echo "Pushing package - ${pkg} to ghcr.io repository - ${repo}"
            helm push "${pkg}" "oci://ghcr.io/${repo}"
          done
        env:
          GITHUB_TOKEN: "${{ secrets.GITHUB_TOKEN }}"
