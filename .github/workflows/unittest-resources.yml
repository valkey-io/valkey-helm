name: Test valkey-resources chart

on:
  pull_request:
    paths:
      - "valkey-resources/**"
      - ".github/workflows/unittest-resources.yml"
  push:
    branches:
      - main
    paths:
      - "valkey-resources/**"
      - ".github/workflows/unittest-resources.yml"
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.19.4

      - name: Install helm-unittest plugin
        run: helm plugin install https://github.com/helm-unittest/helm-unittest --version 1.0.2

      - name: Lint chart
        run: helm lint ./valkey-resources

      - name: Run unit tests
        run: helm unittest ./valkey-resources
