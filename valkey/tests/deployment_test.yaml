suite: deployment configuration
templates:
  - templates/deploy_valkey.yaml
  - templates/init_config.yaml
tests:
  - it: should not create Deployment when replica.enabled is true
    set:
      replica.enabled: true
    template: templates/deploy_valkey.yaml
    asserts:
      - hasDocuments:
          count: 0

  - it: should not create Deployment when cluster.enabled is true
    set:
      cluster.enabled: true
    template: templates/deploy_valkey.yaml
    asserts:
      - hasDocuments:
          count: 0

  - it: should not create Deployment when both replica.enabled and cluster.enabled are true
    set:
      replica.enabled: true
      cluster.enabled: true
    template: templates/deploy_valkey.yaml
    asserts:
      - hasDocuments:
          count: 0

  - it: should create Deployment when both replica.enabled and cluster.enabled are false
    set:
      replica.enabled: false
      cluster.enabled: false
    template: templates/deploy_valkey.yaml
    asserts:
      - hasDocuments:
          count: 1
      - isKind:
          of: Deployment

  - it: should not have auth volumes when auth disabled
    set:
      auth.enabled: false
    template: templates/deploy_valkey.yaml
    asserts:
      - isKind:
          of: Deployment
      - notExists:
          path: spec.template.spec.volumes[?(@.name == "valkey-users-secret")]
      - notExists:
          path: spec.template.spec.volumes[?(@.name == "valkey-auth-secret")]
      - notExists:
          path: spec.template.spec.initContainers[0].volumeMounts[?(@.name == "valkey-users-secret")]
      - notExists:
          path: spec.template.spec.initContainers[0].volumeMounts[?(@.name == "valkey-auth-secret")]

  - it: should have generated volume with inline passwords
    set:
      auth.enabled: true
      auth.aclUsers:
        default:
          permissions: "~* &* +@all"
          password: "default-password"
    template: templates/deploy_valkey.yaml
    asserts:
      - isKind:
          of: Deployment
      - contains:
          path: spec.template.spec.volumes
          content:
            name: valkey-auth-secret
            secret:
              secretName: RELEASE-NAME-valkey-auth
              defaultMode: 0400
      - contains:
          path: spec.template.spec.initContainers[0].volumeMounts
          content:
            name: valkey-auth-secret
            mountPath: /valkey-auth-secret
            readOnly: true

  - it: should have users-secret volume with usersExistingSecret
    set:
      auth.enabled: true
      auth.usersExistingSecret: "my-custom-secret"
      auth.aclUsers:
        default:
          permissions: "~* &* +@all"
    template: templates/deploy_valkey.yaml
    asserts:
      - isKind:
          of: Deployment
      - contains:
          path: spec.template.spec.volumes
          content:
            name: valkey-users-secret
            secret:
              secretName: my-custom-secret
              defaultMode: 0400
      - contains:
          path: spec.template.spec.initContainers[0].volumeMounts
          content:
            name: valkey-users-secret
            mountPath: /valkey-users-secret
            readOnly: true

  - it: should render users-secret volume with templated usersExistingSecret
    set:
      auth.enabled: true
      auth.usersExistingSecret: "my-custom-secret-{{ .Release.Name }}"
      auth.aclUsers:
        default:
          permissions: "~* &* +@all"
    template: templates/deploy_valkey.yaml
    asserts:
      - isKind:
          of: Deployment
      - contains:
          path: spec.template.spec.volumes
          content:
            name: valkey-users-secret
            secret:
              secretName: my-custom-secret-RELEASE-NAME
              defaultMode: 0400

  - it: should have both volumes with mixed passwords
    set:
      auth.enabled: true
      auth.usersExistingSecret: "my-custom-secret"
      auth.aclUsers:
        default:
          permissions: "~* &* +@all"
          password: "default-password"
        readonly:
          permissions: "~* +@read"
    template: templates/deploy_valkey.yaml
    asserts:
      - isKind:
          of: Deployment
      - contains:
          path: spec.template.spec.volumes
          content:
            name: valkey-users-secret
            secret:
              secretName: my-custom-secret
              defaultMode: 0400
      - contains:
          path: spec.template.spec.volumes
          content:
            name: valkey-auth-secret
            secret:
              secretName: RELEASE-NAME-valkey-auth
              defaultMode: 0400

  - it: should have generated volume with aclConfig only
    set:
      auth.enabled: true
      auth.aclConfig: "user default on >password ~* &* +@all"
    template: templates/deploy_valkey.yaml
    asserts:
      - isKind:
          of: Deployment
      - contains:
          path: spec.template.spec.volumes
          content:
            name: valkey-auth-secret
            secret:
              secretName: RELEASE-NAME-valkey-auth
              defaultMode: 0400

  - it: should use custom image
    set:
      image.registry: custom-registry
      image.repository: valkey/valkey
      image.tag: "7.0.0"
    template: templates/deploy_valkey.yaml
    asserts:
      - equal:
          path: spec.template.spec.containers[0].image
          value: custom-registry/valkey/valkey:7.0.0

  - it: should have service account
    set:
      serviceAccount.create: true
      serviceAccount.name: "custom-sa"
    template: templates/deploy_valkey.yaml
    asserts:
      - equal:
          path: spec.template.spec.serviceAccountName
          value: custom-sa

  - it: should use image pull policy for containers and initContainers
    set:
      image.pullPolicy: Always
    template: templates/deploy_valkey.yaml
    asserts:
      - equal:
          path: spec.template.spec.containers[0].imagePullPolicy
          value: Always
      - equal:
          path: spec.template.spec.initContainers[0].imagePullPolicy
          value: Always

  - it: should always have annotations block even without podAnnotations
    set:
      podAnnotations: null
    template: templates/deploy_valkey.yaml
    asserts:
      - isKind:
          of: Deployment
      - exists:
          path: spec.template.metadata.annotations
      - exists:
          path: spec.template.metadata.annotations["checksum/initconfig"]

  - it: should include podAnnotations when provided
    set:
      podAnnotations:
        prometheus.io/scrape: "true"
        custom.annotation: "value"
    template: templates/deploy_valkey.yaml
    asserts:
      - isKind:
          of: Deployment
      - equal:
          path: spec.template.metadata.annotations["prometheus.io/scrape"]
          value: "true"
      - equal:
          path: spec.template.metadata.annotations["custom.annotation"]
          value: value
      - exists:
          path: spec.template.metadata.annotations["checksum/initconfig"]

  - it: should use image pull policy for containers, initContainers and metrics
    set:
      image.pullPolicy: Always
      metrics.enabled: true
      metrics.exporter.image.pullPolicy: Always
    template: templates/deploy_valkey.yaml
    asserts:
      - equal:
          path: spec.template.spec.containers[0].imagePullPolicy
          value: Always
      - equal:
          path: spec.template.spec.initContainers[0].imagePullPolicy
          value: Always
      - equal:
          path: spec.template.spec.containers[1].imagePullPolicy
          value: Always

  - it: should not have imagePullSecrets when not configured
    template: templates/deploy_valkey.yaml
    asserts:
      - isKind:
          of: Deployment
      - notExists:
          path: spec.template.spec.imagePullSecrets

  - it: should render imagePullSecrets from values.imagePullSecrets
    set:
      imagePullSecrets:
        - myregistrykey
        - anotherregistrykey
    template: templates/deploy_valkey.yaml
    asserts:
      - isKind:
          of: Deployment
      - equal:
          path: spec.template.spec.imagePullSecrets
          value:
            - name: myregistrykey
            - name: anotherregistrykey

  - it: should render imagePullSecrets from global.imagePullSecrets
    set:
      global.imagePullSecrets:
        - globalregistrykey
    template: templates/deploy_valkey.yaml
    asserts:
      - isKind:
          of: Deployment
      - equal:
          path: spec.template.spec.imagePullSecrets
          value:
            - name: globalregistrykey

  - it: should merge global and local imagePullSecrets
    set:
      global.imagePullSecrets:
        - globalregistrykey
      imagePullSecrets:
        - localregistrykey
    template: templates/deploy_valkey.yaml
    asserts:
      - isKind:
          of: Deployment
      - equal:
          path: spec.template.spec.imagePullSecrets
          value:
            - name: globalregistrykey
            - name: localregistrykey
          
  - it: should include extra containers from overlay
    set:
      extraContainers:
        - name: nginx-sidecar
          image: registry.hub.docker.com/nginx/nginx:stable-alpine
    template: templates/deploy_valkey.yaml
    asserts:
      - isKind:
          of: Deployment
      - equal:
          path: spec.template.spec.containers[1].name
          value: nginx-sidecar

  - it: should render extraVolumes
    set:
      extraVolumes:
        - name: extra-config
          configMap:
            name: my-config
        - name: extra-secret
          secret:
            secretName: my-secret
    template: templates/deploy_valkey.yaml
    asserts:
      - isKind:
          of: Deployment
      - contains:
          path: spec.template.spec.volumes
          content:
            name: extra-config
            configMap:
              name: my-config
      - contains:
          path: spec.template.spec.volumes
          content:
            name: extra-secret
            secret:
              secretName: my-secret

  - it: should render extraVolumeMounts for main container
    set:
      extraVolumeMounts:
        - name: extra-config
          mountPath: /extra-config
          readOnly: true
        - name: extra-data
          mountPath: /extra/data
    template: templates/deploy_valkey.yaml
    asserts:
      - isKind:
          of: Deployment
      - contains:
          path: spec.template.spec.containers[0].volumeMounts
          content:
            name: extra-config
            mountPath: /extra-config
            readOnly: true
      - contains:
          path: spec.template.spec.containers[0].volumeMounts
          content:
            name: extra-data
            mountPath: /extra/data

  - it: should render both extraVolumes and extraVolumeMounts together
    set:
      extraVolumes:
        - name: extra-config
          configMap:
            name: my-config
      extraVolumeMounts:
        - name: extra-config
          mountPath: /extra-config
          readOnly: true
    template: templates/deploy_valkey.yaml
    asserts:
      - isKind:
          of: Deployment
      - contains:
          path: spec.template.spec.volumes
          content:
            name: extra-config
            configMap:
              name: my-config
      - contains:
          path: spec.template.spec.containers[0].volumeMounts
          content:
            name: extra-config
            mountPath: /extra-config
            readOnly: true

  - it: should include workload annotations when provided
    set:
      workloadAnnotations:
        example.com/annotation: "test-value"
        custom.annotation: "custom-value"
    template: templates/deploy_valkey.yaml
    asserts:
      - isKind:
          of: Deployment
      - equal:
          path: metadata.annotations["example.com/annotation"]
          value: "test-value"
      - equal:
          path: metadata.annotations["custom.annotation"]
          value: "custom-value"

  - it: should not have REDIS_PASSWORD env in metrics exporter when auth is disabled
    set:
      auth.enabled: false
      metrics.enabled: true
    template: templates/deploy_valkey.yaml
    asserts:
      - isKind:
          of: Deployment
      - notContains:
          path: spec.template.spec.containers[1].env
          content:
            name: REDIS_PASSWORD

  - it: should set REDIS_PASSWORD from generated secret in metrics exporter when auth is enabled
    set:
      auth.enabled: true
      auth.aclUsers:
        default:
          permissions: "~* &* +@all"
          password: "default-password"
      metrics.enabled: true
    template: templates/deploy_valkey.yaml
    asserts:
      - isKind:
          of: Deployment
      - contains:
          path: spec.template.spec.containers[1].env
          content:
            name: REDIS_PASSWORD
            valueFrom:
              secretKeyRef:
                name: RELEASE-NAME-valkey-auth
                key: default-password

  - it: should set REDIS_PASSWORD from existing secret in metrics exporter when usersExistingSecret is set
    set:
      auth.enabled: true
      auth.usersExistingSecret: "my-custom-secret"
      auth.aclUsers:
        default:
          permissions: "~* &* +@all"
      metrics.enabled: true
    template: templates/deploy_valkey.yaml
    asserts:
      - isKind:
          of: Deployment
      - contains:
          path: spec.template.spec.containers[1].env
          content:
            name: REDIS_PASSWORD
            valueFrom:
              secretKeyRef:
                name: my-custom-secret
                key: default

  - it: should render templated usersExistingSecret in metrics exporter
    set:
      auth.enabled: true
      auth.usersExistingSecret: "my-custom-secret-{{ .Release.Name }}"
      auth.aclUsers:
        default:
          permissions: "~* &* +@all"
      metrics.enabled: true
    template: templates/deploy_valkey.yaml
    asserts:
      - isKind:
          of: Deployment
      - contains:
          path: spec.template.spec.containers[1].env
          content:
            name: REDIS_PASSWORD
            valueFrom:
              secretKeyRef:
                name: my-custom-secret-RELEASE-NAME
                key: default

  - it: should set REDIS_PASSWORD using custom passwordKey in metrics exporter when usersExistingSecret is set
    set:
      auth.enabled: true
      auth.usersExistingSecret: "my-custom-secret"
      auth.aclUsers:
        default:
          permissions: "~* &* +@all"
          passwordKey: "my-password-key"
      metrics.enabled: true
    template: templates/deploy_valkey.yaml
    asserts:
      - isKind:
          of: Deployment
      - contains:
          path: spec.template.spec.containers[1].env
          content:
            name: REDIS_PASSWORD
            valueFrom:
              secretKeyRef:
                name: my-custom-secret
                key: my-password-key

  - it: should not set runtimeClassName when empty
    set:
      runtimeClassName: ""
    template: templates/deploy_valkey.yaml
    asserts:
      - isKind:
          of: Deployment
      - notExists:
          path: spec.template.spec.runtimeClassName

  - it: should set runtimeClassName when provided
    set:
      runtimeClassName: "gvisor"
    template: templates/deploy_valkey.yaml
    asserts:
      - isKind:
          of: Deployment
      - equal:
          path: spec.template.spec.runtimeClassName
          value: "gvisor"

  # Regression: previously the exporter pointed REDIS_PASSWORD at a key
  # (`default-password`) that is never created in aclConfig-only mode, so the
  # container crash-looped on CreateContainerConfigError.
  - it: should omit REDIS_PASSWORD when only auth.aclConfig is set
    set:
      auth.enabled: true
      auth.aclConfig: "user default on >p ~* &* +@all"
      metrics.enabled: true
    template: templates/deploy_valkey.yaml
    asserts:
      - isKind:
          of: Deployment
      - notContains:
          path: spec.template.spec.containers[1].env
          content:
            name: REDIS_PASSWORD
          any: true

  # Regression: probes must accept NOAUTH as proof of liveness, otherwise every
  # auth-enabled deployment's liveness probe silently passes on exit code 0
  # while not actually checking anything meaningful.
  - it: should use a PONG|NOAUTH-tolerant probe on the valkey container
    set:
      auth.enabled: true
      auth.aclUsers:
        default:
          permissions: "~* &* +@all"
          password: "p"
    template: templates/deploy_valkey.yaml
    asserts:
      - matchRegex:
          path: spec.template.spec.containers[0].startupProbe.exec.command[2]
          pattern: "PONG\\|NOAUTH"
      - matchRegex:
          path: spec.template.spec.containers[0].livenessProbe.exec.command[2]
          pattern: "PONG\\|NOAUTH"
      - matchRegex:
          path: spec.template.spec.containers[0].readinessProbe.exec.command[2]
          pattern: "PONG\\|NOAUTH"

  # Regression: there should be a readiness probe at all — previously missing.
  - it: should define a readiness probe
    template: templates/deploy_valkey.yaml
    asserts:
      - exists:
          path: spec.template.spec.containers[0].readinessProbe

  # --- LOADING must NOT be accepted by ANY probe (slow-load handling) ---
  - it: standalone startupProbe must reject LOADING (so the gate has teeth)
    template: templates/deploy_valkey.yaml
    asserts:
      - notMatchRegex:
          path: spec.template.spec.containers[0].startupProbe.exec.command[2]
          pattern: "LOADING"

  - it: standalone livenessProbe must NOT accept LOADING
    template: templates/deploy_valkey.yaml
    asserts:
      - notMatchRegex:
          path: spec.template.spec.containers[0].livenessProbe.exec.command[2]
          pattern: "LOADING"

  - it: standalone readinessProbe must NOT accept LOADING
    template: templates/deploy_valkey.yaml
    asserts:
      - notMatchRegex:
          path: spec.template.spec.containers[0].readinessProbe.exec.command[2]
          pattern: "LOADING"

  - it: top-level startupProbe overrides should land on the startupProbe only
    set:
      startupProbe.failureThreshold: 240
    template: templates/deploy_valkey.yaml
    asserts:
      - equal:
          path: spec.template.spec.containers[0].startupProbe.failureThreshold
          value: 240
      - equal:
          path: spec.template.spec.containers[0].livenessProbe.failureThreshold
          value: 6
      - equal:
          path: spec.template.spec.containers[0].readinessProbe.failureThreshold
          value: 3

  # --- Istio ambient mode ---
  - it: should add ambient dataplane-mode label when istio.mode=ambient
    set:
      istio.enabled: true
      istio.mode: ambient
    template: templates/deploy_valkey.yaml
    asserts:
      - equal:
          path: spec.template.metadata.labels["istio.io/dataplane-mode"]
          value: ambient

  # In sidecar mode istio.io/dataplane-mode is set to "none" (not absent) so
  # a dual-mode cluster running ambient too doesn't accidentally capture
  # this pod via ztunnel on top of its Envoy sidecar.
  - it: should set istio.io/dataplane-mode=none in sidecar mode
    set:
      istio.enabled: true
      istio.mode: sidecar
    template: templates/deploy_valkey.yaml
    asserts:
      - equal:
          path: spec.template.metadata.labels["istio.io/dataplane-mode"]
          value: none

  # Namespaces labelled `istio-injection=enabled` would otherwise inject an
  # Envoy sidecar AND the ambient capture label would direct traffic to
  # ztunnel — the pod then gets double-redirected and every connection
  # fails with "Connection reset by peer". Opting the pod out of injection
  # explicitly is the only reliable way to make ambient work in that setup.
  - it: should set sidecar.istio.io/inject=false in ambient mode
    set:
      istio.enabled: true
      istio.mode: ambient
    template: templates/deploy_valkey.yaml
    asserts:
      - equal:
          path: spec.template.metadata.labels["sidecar.istio.io/inject"]
          value: "false"

  # Sidecar mode now forces injection on at the pod level so the chart
  # doesn't silently depend on the namespace carrying
  # istio-injection=enabled. Previously this was the user's problem to get
  # right — half the "it's not working" issue reports in sidecar mode came
  # down to "the namespace wasn't labelled".
  - it: should set sidecar.istio.io/inject=true in sidecar mode
    set:
      istio.enabled: true
      istio.mode: sidecar
    template: templates/deploy_valkey.yaml
    asserts:
      - equal:
          path: spec.template.metadata.labels["sidecar.istio.io/inject"]
          value: "true"

  - it: should NOT add ambient dataplane-mode label when istio is disabled
    set:
      istio.enabled: false
    template: templates/deploy_valkey.yaml
    asserts:
      - notExists:
          path: spec.template.metadata.labels["istio.io/dataplane-mode"]

  # Regression: the istioPodLabels helper used to emit nothing in sidecar
  # mode AND still have its caller run `nindent 8`, which injects a blank
  # line into the labels map. Valid YAML, but crap to read in diffs. After
  # the fix the labels map holds exactly the selector labels + the two
  # mode-specific keys — no blank key, no stray whitespace.
  - it: should produce exactly the sidecar label set in sidecar mode
    set:
      istio.enabled: true
      istio.mode: sidecar
    template: templates/deploy_valkey.yaml
    asserts:
      - equal:
          path: spec.template.metadata.labels
          value:
            app.kubernetes.io/name: valkey
            app.kubernetes.io/instance: RELEASE-NAME
            sidecar.istio.io/inject: "true"
            istio.io/dataplane-mode: none

  # And with ambient, exactly the two ambient-specific keys on top of the
  # selector labels — and nothing else.
  - it: should produce exactly the ambient label set in ambient mode
    set:
      istio.enabled: true
      istio.mode: ambient
    template: templates/deploy_valkey.yaml
    asserts:
      - equal:
          path: spec.template.metadata.labels
          value:
            app.kubernetes.io/name: valkey
            app.kubernetes.io/instance: RELEASE-NAME
            istio.io/dataplane-mode: ambient
            sidecar.istio.io/inject: "false"

  # And with istio disabled, no mesh labels at all — users can still opt
  # into their own mesh labels via podLabels.
  - it: should emit no mesh labels when istio.enabled is false
    set:
      istio.enabled: false
    template: templates/deploy_valkey.yaml
    asserts:
      - equal:
          path: spec.template.metadata.labels
          value:
            app.kubernetes.io/name: valkey
            app.kubernetes.io/instance: RELEASE-NAME

  # User override: a podLabels entry that collides with a chart-computed
  # mesh label (e.g. sidecar.istio.io/inject) must win cleanly, with NO
  # duplicate YAML keys in the rendered output. This lets operators run
  # istio.enabled=true but force a specific release out of the sidecar
  # mesh (rare but legitimate — e.g. pinning a canary pod to plain TCP).
  - it: user podLabels must override chart mesh labels cleanly
    set:
      istio.enabled: true
      istio.mode: sidecar
      podLabels:
        sidecar.istio.io/inject: "false"
        custom-label: "custom-value"
    template: templates/deploy_valkey.yaml
    asserts:
      - equal:
          path: spec.template.metadata.labels["sidecar.istio.io/inject"]
          value: "false"
      - equal:
          path: spec.template.metadata.labels["istio.io/dataplane-mode"]
          value: none
      - equal:
          path: spec.template.metadata.labels["custom-label"]
          value: "custom-value"

  # Regression: installing istio.enabled=false with a typo'd istio.mode
  # (istio.mode=ambiet) used to sail through because the validator gated
  # on istio.enabled. With schema validation active it now fails at lint,
  # and the template helper would catch it too if someone force-fed an
  # invalid value past the schema. This ensures the helper still errors.
  - it: should reject typo'd istio.mode even when istio.enabled=false (at schema layer)
    set:
      istio.enabled: false
      istio.mode: ambiet
    template: templates/deploy_valkey.yaml
    asserts:
      - failedTemplate:
          errorMessage: "values don't meet the specifications of the schema(s) in the following chart(s):\nvalkey:\n- at '/istio/mode': value must be one of 'sidecar', 'ambient'\n"
