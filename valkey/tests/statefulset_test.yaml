suite: statefulset configuration
templates:
  - templates/statefulset.yaml
  - templates/init_config.yaml
tests:
  - it: should fail when replica enabled but no size provided
    set:
      replica.enabled: true
      replica.persistence.size: ""
    template: templates/statefulset.yaml
    asserts:
      - failedTemplate:
          errorPattern: "Replica mode requires persistent storage.*"

  - it: should succeed when replica enabled with size provided
    set:
      replica.enabled: true
      replica.persistence.size: "5Gi"
    template: templates/statefulset.yaml
    asserts:
      - isKind:
          of: StatefulSet
      - equal:
          path: spec.volumeClaimTemplates[0].spec.resources.requests.storage
          value: "5Gi"

  - it: should succeed when replica enabled with custom storageClass
    set:
      replica.enabled: true
      replica.persistence.size: "10Gi"
      replica.persistence.storageClass: "fast-ssd"
    template: templates/statefulset.yaml
    asserts:
      - isKind:
          of: StatefulSet
      - equal:
          path: spec.volumeClaimTemplates[0].spec.resources.requests.storage
          value: "10Gi"
      - equal:
          path: spec.volumeClaimTemplates[0].spec.storageClassName
          value: "fast-ssd"

  - it: should always have annotations block even without podAnnotations
    set:
      replica.enabled: true
      replica.persistence.size: "5Gi"
      podAnnotations: null
    template: templates/statefulset.yaml
    asserts:
      - isKind:
          of: StatefulSet
      - exists:
          path: spec.template.metadata.annotations
      - exists:
          path: spec.template.metadata.annotations["checksum/initconfig"]

  - it: should include podAnnotations when provided
    set:
      replica.enabled: true
      replica.persistence.size: "5Gi"
      podAnnotations:
        prometheus.io/scrape: "true"
        custom.annotation: "value"
    template: templates/statefulset.yaml
    asserts:
      - isKind:
          of: StatefulSet
      - equal:
          path: spec.template.metadata.annotations["prometheus.io/scrape"]
          value: "true"
      - equal:
          path: spec.template.metadata.annotations["custom.annotation"]
          value: value
      - exists:
          path: spec.template.metadata.annotations["checksum/initconfig"]

  - it: should use image pull policy for containers, initContainers and metrics
    set:
      replica.enabled: true
      replica.persistence.size: "5Gi"
      image.pullPolicy: Always
      metrics.enabled: true
      metrics.exporter.image.pullPolicy: Always
    template: templates/statefulset.yaml
    asserts:
      - equal:
          path: spec.template.spec.containers[0].imagePullPolicy
          value: Always
      - equal:
          path: spec.template.spec.initContainers[0].imagePullPolicy
          value: Always
      - equal:
          path: spec.template.spec.containers[1].imagePullPolicy
          value: Always

  - it: should not have imagePullSecrets when not configured
    set:
      replica.enabled: true
      replica.persistence.size: "5Gi"
    template: templates/statefulset.yaml
    asserts:
      - isKind:
          of: StatefulSet
      - notExists:
          path: spec.template.spec.imagePullSecrets

  - it: should render imagePullSecrets from values.imagePullSecrets
    set:
      replica.enabled: true
      replica.persistence.size: "5Gi"
      imagePullSecrets:
        - myregistrykey
        - anotherregistrykey
    template: templates/statefulset.yaml
    asserts:
      - isKind:
          of: StatefulSet
      - equal:
          path: spec.template.spec.imagePullSecrets
          value:
            - name: myregistrykey
            - name: anotherregistrykey

  - it: should render imagePullSecrets from global.imagePullSecrets
    set:
      replica.enabled: true
      replica.persistence.size: "5Gi"
      global.imagePullSecrets:
        - globalregistrykey
    template: templates/statefulset.yaml
    asserts:
      - isKind:
          of: StatefulSet
      - equal:
          path: spec.template.spec.imagePullSecrets
          value:
            - name: globalregistrykey

  - it: should merge global and local imagePullSecrets
    set:
      replica.enabled: true
      replica.persistence.size: "5Gi"
      global.imagePullSecrets:
        - globalregistrykey
      imagePullSecrets:
        - localregistrykey
    template: templates/statefulset.yaml
    asserts:
      - isKind:
          of: StatefulSet
      - equal:
          path: spec.template.spec.imagePullSecrets
          value:
            - name: globalregistrykey
            - name: localregistrykey

  - it: should include extraContainers when provided
    set:
      replica.enabled: true
      replica.persistence.size: "5Gi"
      extraContainers:
        - name: nginx
          image: registry.hub.docker.com/nginx/nginx:stable-alpine
    template: templates/statefulset.yaml
    asserts:
      - isKind:
          of: StatefulSet
      - equal:
          path: spec.template.spec.containers[1].name
          value: nginx
  - it: should render extraVolumes
    set:
      replica.enabled: true
      replica.persistence.size: "5Gi"
      extraVolumes:
        - name: extra-config
          configMap:
            name: my-config
        - name: extra-secret
          secret:
            secretName: my-secret
    template: templates/statefulset.yaml
    asserts:
      - isKind:
          of: StatefulSet
      - contains:
          path: spec.template.spec.volumes
          content:
            name: extra-config
            configMap:
              name: my-config
      - contains:
          path: spec.template.spec.volumes
          content:
            name: extra-secret
            secret:
              secretName: my-secret

  - it: should render extraVolumeMounts for main container
    set:
      replica.enabled: true
      replica.persistence.size: "5Gi"
      extraVolumeMounts:
        - name: extra-config
          mountPath: /extra-config
          readOnly: true
        - name: extra-data
          mountPath: /extra/data
    template: templates/statefulset.yaml
    asserts:
      - isKind:
          of: StatefulSet
      - contains:
          path: spec.template.spec.containers[0].volumeMounts
          content:
            name: extra-config
            mountPath: /extra-config
            readOnly: true
      - contains:
          path: spec.template.spec.containers[0].volumeMounts
          content:
            name: extra-data
            mountPath: /extra/data

  - it: should render both extraVolumes and extraVolumeMounts together
    set:
      replica.enabled: true
      replica.persistence.size: "5Gi"
      extraVolumes:
        - name: extra-config
          configMap:
            name: my-config
      extraVolumeMounts:
        - name: extra-config
          mountPath: /extra-config
          readOnly: true
    template: templates/statefulset.yaml
    asserts:
      - isKind:
          of: StatefulSet
      - contains:
          path: spec.template.spec.volumes
          content:
            name: extra-config
            configMap:
              name: my-config
      - contains:
          path: spec.template.spec.containers[0].volumeMounts
          content:
            name: extra-config
            mountPath: /extra-config
            readOnly: true

  - it: should include persistentVolumeClaimRetentionPolicy when configured
    set:
      replica.enabled: true
      replica.persistence.size: "5Gi"
      replica.persistentVolumeClaimRetentionPolicy:
        whenDeleted: Retain
        whenScaled: Delete
    template: templates/statefulset.yaml
    asserts:
      - isKind:
          of: StatefulSet
      - equal:
          path: spec.persistentVolumeClaimRetentionPolicy.whenDeleted
          value: Retain
      - equal:
          path: spec.persistentVolumeClaimRetentionPolicy.whenScaled
          value: Delete

  - it: should include workload annotations when provided
    set:
      replica.enabled: true
      replica.persistence.size: "5Gi"
      workloadAnnotations:
        example.com/annotation: "test-value"
        custom.annotation: "custom-value"
    template: templates/statefulset.yaml
    asserts:
      - isKind:
          of: StatefulSet
      - equal:
          path: metadata.annotations["example.com/annotation"]
          value: "test-value"
      - equal:
          path: metadata.annotations["custom.annotation"]
          value: "custom-value"

  - it: should not have REDIS_PASSWORD env in metrics exporter when auth is disabled
    set:
      replica.enabled: true
      replica.persistence.size: "5Gi"
      auth.enabled: false
      metrics.enabled: true
    template: templates/statefulset.yaml
    asserts:
      - isKind:
          of: StatefulSet
      - notContains:
          path: spec.template.spec.containers[1].env
          content:
            name: REDIS_PASSWORD

  - it: should set REDIS_PASSWORD from generated secret in metrics exporter when auth is enabled
    set:
      replica.enabled: true
      replica.persistence.size: "5Gi"
      auth.enabled: true
      auth.aclUsers:
        default:
          permissions: "~* &* +@all"
          password: "default-password"
      metrics.enabled: true
    template: templates/statefulset.yaml
    asserts:
      - isKind:
          of: StatefulSet
      - contains:
          path: spec.template.spec.containers[1].env
          content:
            name: REDIS_PASSWORD
            valueFrom:
              secretKeyRef:
                name: RELEASE-NAME-valkey-auth
                key: default-password

  - it: should set REDIS_PASSWORD from existing secret in metrics exporter when usersExistingSecret is set
    set:
      replica.enabled: true
      replica.persistence.size: "5Gi"
      auth.enabled: true
      auth.usersExistingSecret: "my-custom-secret"
      auth.aclUsers:
        default:
          permissions: "~* &* +@all"
      metrics.enabled: true
    template: templates/statefulset.yaml
    asserts:
      - isKind:
          of: StatefulSet
      - contains:
          path: spec.template.spec.containers[1].env
          content:
            name: REDIS_PASSWORD
            valueFrom:
              secretKeyRef:
                name: my-custom-secret
                key: default

  - it: should set REDIS_PASSWORD using custom passwordKey in metrics exporter when usersExistingSecret is set
    set:
      replica.enabled: true
      replica.persistence.size: "5Gi"
      auth.enabled: true
      auth.usersExistingSecret: "my-custom-secret"
      auth.aclUsers:
        default:
          permissions: "~* &* +@all"
          passwordKey: "my-password-key"
      metrics.enabled: true
    template: templates/statefulset.yaml
    asserts:
      - isKind:
          of: StatefulSet
      - contains:
          path: spec.template.spec.containers[1].env
          content:
            name: REDIS_PASSWORD
            valueFrom:
              secretKeyRef:
                name: my-custom-secret
                key: my-password-key

  # Regression: probes must accept NOAUTH as proof of liveness.
  - it: should use a PONG|NOAUTH-tolerant probe on the valkey container
    set:
      replica.enabled: true
      replica.persistence.size: "5Gi"
      auth.enabled: true
      auth.aclUsers:
        default:
          permissions: "~* &* +@all"
          password: "p"
    template: templates/statefulset.yaml
    asserts:
      - matchRegex:
          path: spec.template.spec.containers[0].startupProbe.exec.command[2]
          pattern: "PONG\\|NOAUTH"
      - matchRegex:
          path: spec.template.spec.containers[0].livenessProbe.exec.command[2]
          pattern: "PONG\\|NOAUTH"
      - matchRegex:
          path: spec.template.spec.containers[0].readinessProbe.exec.command[2]
          pattern: "PONG\\|NOAUTH"

  - it: should define a readiness probe
    set:
      replica.enabled: true
      replica.persistence.size: "5Gi"
    template: templates/statefulset.yaml
    asserts:
      - exists:
          path: spec.template.spec.containers[0].readinessProbe

  # --- LOADING must NOT be accepted by ANY probe (slow-load handling) ---
  - it: replicated startupProbe must reject LOADING (so the gate has teeth)
    set:
      replica.enabled: true
      replica.persistence.size: "5Gi"
    template: templates/statefulset.yaml
    asserts:
      - notMatchRegex:
          path: spec.template.spec.containers[0].startupProbe.exec.command[2]
          pattern: "LOADING"

  - it: replicated livenessProbe must NOT accept LOADING
    set:
      replica.enabled: true
      replica.persistence.size: "5Gi"
    template: templates/statefulset.yaml
    asserts:
      - notMatchRegex:
          path: spec.template.spec.containers[0].livenessProbe.exec.command[2]
          pattern: "LOADING"

  - it: replicated readinessProbe must NOT accept LOADING
    set:
      replica.enabled: true
      replica.persistence.size: "5Gi"
    template: templates/statefulset.yaml
    asserts:
      - notMatchRegex:
          path: spec.template.spec.containers[0].readinessProbe.exec.command[2]
          pattern: "LOADING"

  - it: replica.startupProbe overrides should land on the startupProbe only
    set:
      replica.enabled: true
      replica.persistence.size: "5Gi"
      replica.startupProbe.failureThreshold: 240
    template: templates/statefulset.yaml
    asserts:
      - equal:
          path: spec.template.spec.containers[0].startupProbe.failureThreshold
          value: 240
      - equal:
          path: spec.template.spec.containers[0].livenessProbe.failureThreshold
          value: 6
      - equal:
          path: spec.template.spec.containers[0].readinessProbe.failureThreshold
          value: 3

  # --- Istio ambient mode ---
  - it: should add ambient dataplane-mode label when istio.mode=ambient
    set:
      replica.enabled: true
      replica.persistence.size: "5Gi"
      istio.enabled: true
      istio.mode: ambient
    template: templates/statefulset.yaml
    asserts:
      - equal:
          path: spec.template.metadata.labels["istio.io/dataplane-mode"]
          value: ambient

  # Sidecar mode emits istio.io/dataplane-mode=none (veto ambient capture)
  # and sidecar.istio.io/inject=true (force injection), so the chart is
  # self-sufficient on clusters that run both data planes side-by-side.
  - it: should set sidecar-mode mesh labels in sidecar mode
    set:
      replica.enabled: true
      replica.persistence.size: "5Gi"
      istio.enabled: true
      istio.mode: sidecar
    template: templates/statefulset.yaml
    asserts:
      - equal:
          path: spec.template.metadata.labels["istio.io/dataplane-mode"]
          value: none
      - equal:
          path: spec.template.metadata.labels["sidecar.istio.io/inject"]
          value: "true"
