global:
  # The global image registry (this will override the registry of all container images defined in this chart)
  imageRegistry: ""
  # The global image pull secrets (list of secret names)
  imagePullSecrets: []

image:
  # Image registry
  registry: "docker.io"
  # Valkey container image repository
  repository: valkey/valkey
  # Image pull policy (Always, IfNotPresent, Never)
  pullPolicy: IfNotPresent
  # Image tag (leave empty to use .Chart.AppVersion)
  tag: ""

# List of image pull secrets (for private registries)
imagePullSecrets: []

# Override the default name or full name of resources
nameOverride: ""
fullnameOverride: ""

# Kubernetes cluster domain name
clusterDomain: cluster.local

serviceAccount:
  # Create a service account for Valkey
  create: true
  # Whether to automount the service account token
  automount: false
  # Annotations to add to the service account
  annotations: {}
  # Name of an existing service account to use (if create: false)
  name: ""

# Annotations and labels for the pods
podAnnotations: {}
podLabels: {}

# Annotations for the Deployment/StatefulSet resource
workloadAnnotations: {}

# Common labels to add to all resources (Deployment, Service, ConfigMap, etc.)
commonLabels: {}

# Security context for the pod (applies to all containers)
podSecurityContext:
  fsGroup: 1000
  runAsUser: 1000
  runAsGroup: 1000
  seccompProfile:
    type: RuntimeDefault

# Priority class name for pod scheduling (leave empty to use cluster's default)
priorityClassName: ""

# RuntimeClassName for the pods, used to select the container runtime configuration
# (e.g. "gvisor", "kata-containers"). Leave empty to use the cluster's default runtime.
# See https://kubernetes.io/docs/concepts/containers/runtime-class/#usage
runtimeClassName: ""

# Security context for the Valkey containers
securityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL
  readOnlyRootFilesystem: true
  runAsNonRoot: true
  runAsUser: 1000

service:
  # Type of Kubernetes service (ClusterIP, NodePort, LoadBalancer)
  type: ClusterIP
  # Port on which Valkey will be exposed
  port: 6379
  annotations: {}
  # NodePort value (if service.type is NodePort)
  nodePort: 0
  # ClusterIP value
  clusterIP: ""
  # Class of a load balancer implementation
  loadBalancerClass: ""
  # If specified and supported by the platform, this will restrict traffic through the cloud-provider load-balancer
  # will be restricted to the specified client IPs.
  # This field will be ignored if the cloud-provider does not support the feature.
  loadBalancerSourceRanges: []
  # Application protocol
  appProtocol: ""

# Network policy to control traffic to the pods
# More info: https://kubernetes.io/docs/concepts/services-networking/network-policies/
networkPolicy: {}

# Resource limits/requests for the main Valkey container
resources: {}
  # Example:
  # limits:
  #   cpu: 100m
  #   memory: 128Mi
  # requests:
  #   cpu: 100m
  #   memory: 128Mi

# Resource limits/requests for init containers
initResources: {}
  # Example:
  # limits:
  #   cpu: 100m
  #   memory: 128Mi
  # requests:
  #   cpu: 100m
  #   memory: 128Mi

# Additional init containers
extraInitContainers: []

# Additional containers
extraContainers: []

# Persistent storage configuration (standalone deployment only)
dataStorage:
  # Enable persistent volume claim creation
  enabled: false

  # Use existing PVC by name (skip dynamic provisioning if set)
  persistentVolumeClaimName: ""

  # Subpath inside PVC to mount
  subPath: ""

  # Name of the volume (referenced in deployment)
  volumeName: "valkey-data"

  # Request size (e.g. 5Gi) for dynamically provisioned volume
  requestedSize: ""

  # Name of the storage class to use
  className: ""

  # Access modes for the PVC (e.g., ReadWriteOnce, ReadWriteMany)
  accessModes:
    - ReadWriteOnce

  # If true, keep the PVC on Helm uninstall
  keepPvc: false

  # Optional annotations to add to the PVC
  annotations: {}

  # Optional labels to add to the PVC
  labels: {}

  # If hostPath is set then a hostPath DirectoryOrCreate volume is used
  hostPath: ""

# Mount additional secrets into the Valkey container
extraValkeySecrets: []

# Mount additional configMaps into the Valkey container
extraValkeyConfigs: []

# Mount additional emptyDir or hostPath volumes (advanced use)
extraVolumes: []
#  - name: hostpath-volume
#    hostPath:
#      path: /opt/valkey/hostpath-volume/
#      type: DirectoryOrCreate
extraVolumeMounts: []
#  - mountPath: /some/path/
#    name: hostpath-volume

# Content for valkey.conf (will be mounted via ConfigMap)
valkeyConfig: ""

auth:
  # Enable ACL-based authentication
  # IMPORTANT: When authentication is enabled, the 'default' user MUST be defined in either
  # aclUsers or aclConfig. Without a default user, anyone can access the database without
  # credentials, creating a security risk.
  enabled: false

  # Use an existing secret for user passwords. Key defaults to username.
  # Supports templating, e.g.: "users-{{ .Release.Name }}"
  usersExistingSecret: ""

  # Map of users to create with ACL permissions.
  # If usersExistingSecret is set, passwords from the secret take priority over inline passwords.
  # NOTE: If using aclUsers, the 'default' user must be included here.
  aclUsers: {}
  # Example:
  # default:
  #   permissions: "~* &* +@all"
  #   password: "secretpass"        # Inline password (fallback if usersExistingSecret not set)
  #   passwordKey: "admin-pwd"      # Key in usersExistingSecret (defaults to username)
  # read-user:
  #   permissions: "~* -@all +@read +ping +info"

  # Inline ACL configuration that will be appended after generated users.
  # NOTE: If using aclConfig, ensure the 'default' user is defined here.
  aclConfig: ""
  # Example:
  # aclConfig: |
  #   user default on >secretpass ~* &* +@all

# Replica configuration for master-replica replication mode
replica:
  enabled: false

  # Number of replica instances (total pods = replicas + 1 master)
  replicas: 2

  # Username for replicas to authenticate to master, ignored if auth.enabled is false.
  # IMPORTANT: When auth.enabled is true, this user MUST be defined in auth.aclUsers.
  # The chart requires this to retrieve the password for replica authentication.
  # The user must have appropriate replication permissions: +psync +replconf +ping
  replicationUser: "default"

  # Replication settings
  # Use diskless replication (sync directly from memory) vs disk-based
  disklessSync: false

  # Write safety - require minimum number of healthy replicas to accept writes
  # Set to 0 to disable this check, or 1+ to require minimum replicas before accepting writes
  # This ensures data durability by requiring at least N replicas to be in sync
  minReplicasToWrite: 0

  # Maximum replication lag in seconds before a replica is considered unhealthy
  minReplicasMaxLag: 10

  # Read service configuration
  service:
    # Enable read service (load balances read traffic across all pods)
    enabled: true
    # Service type (ClusterIP, NodePort, LoadBalancer)
    type: ClusterIP
    # Port on which the read service will be exposed
    port: 6379
    # Optional annotations for the read service
    annotations: {}
    # NodePort value (if service.type is NodePort)
    nodePort: 0
    # ClusterIP value
    clusterIP: ""
    # Application protocol
    appProtocol: ""
    # Class of a load balancer implementation
    loadBalancerClass: ""
    # If specified and supported by the platform, this will restrict traffic through the cloud-provider load-balancer
    # will be restricted to the specified client IPs.
    # This field will be ignored if the cloud-provider does not support the feature.
    loadBalancerSourceRanges: []

  # Persistence configuration (required for replicas)
  persistence:
    # Size of the PVC for each replica (required when replica.enabled is true)
    size: ""
    # Storage class name (empty = use default storage class)
    storageClass: ""
    # Access modes for the PVC
    accessModes:
      - ReadWriteOnce

  # PersistentVolumeClaim retention policy for StatefulSet
  # Controls when PVCs are deleted (requires Kubernetes 1.23+)
  # More info: https://kubernetes.io/docs/concepts/workloads/controllers/statefulset/#persistentvolumeclaim-retention
  persistentVolumeClaimRetentionPolicy: {}

# Cluster mode configuration for Valkey Cluster (sharded deployment)
# Note: cluster.enabled and replica.enabled are mutually exclusive
cluster:
  # Enable cluster mode (creates a sharded Valkey cluster)
  enabled: false

  # Number of shards (primary nodes). Minimum recommended is 3 for cluster mode.
  # Each shard handles a portion of the hash slot range (16384 slots total).
  shards: 3

  # Number of replicas per shard (for high availability within each shard)
  # Total nodes = shards × (1 + replicasPerShard)
  # For example: 3 shards with 1 replica each = 6 nodes total
  replicasPerShard: 1

  # Username for cluster replication authentication, ignored if auth.enabled is false.
  # IMPORTANT: When auth.enabled is true, this user MUST be defined in auth.aclUsers.
  # The user must have appropriate replication permissions: +psync +replconf +ping
  replicationUser: "default"

  # Cluster node timeout in milliseconds (how long before a node is considered failed)
  nodeTimeout: 15000

  # Require all hash slots to be covered for the cluster to accept writes
  # Set to false to allow partial cluster operation
  requireFullCoverage: true

  # Allow cluster to serve read requests when in down state
  allowReadsWhenDown: false

  # Persistence configuration (required for cluster mode)
  persistence:
    # Size of the PVC for each node (required when cluster.enabled is true)
    size: ""
    # Storage class name (empty = use default storage class)
    storageClass: ""
    # Access modes for the PVC
    accessModes:
      - ReadWriteOnce

  # Bus port for cluster communication (default: service.port + 10000)
  # This port is used for node-to-node communication in the cluster
  busPort: 16379

  # Orderly handover on primary pod shutdown. A `kubectl rollout restart`
  # (or any voluntary eviction) sends SIGTERM to Valkey directly; without a
  # preStop hook, the primary dies with open client connections and the
  # cluster takes up to nodeTimeout to promote a replica. During that
  # window, connection pools fill with dead sockets and the app errors out
  # on every pooled command.
  #
  # With this enabled, each pod's preStop checks whether it is a primary
  # and (if so) asks one of its own replicas to run `CLUSTER FAILOVER` —
  # Valkey's canonical graceful-handover command. The primary demotes to
  # replica in the same pass, so by the time SIGTERM arrives the shard
  # already has a new primary and existing connections close cleanly.
  #
  # No-op when:
  #   * the pod is already a replica (nothing to fail over);
  #   * the shard has no replicas (replicasPerShard=0 — nothing to fail
  #     over TO);
  #   * the pod has no healthy replica of its own (FAILOVER would target
  #     nothing).
  # The hook is strictly best-effort — any error path falls through to the
  # normal SIGTERM, which is the pre-existing (suboptimal) behaviour.
  preStopFailover:
    # Enable the preStop CLUSTER FAILOVER hook.
    enabled: true
    # How long to wait for the ex-primary to observe its own demotion
    # before giving up and letting kubelet send SIGTERM. Keep comfortably
    # below terminationGracePeriodSeconds — kubelet counts the preStop
    # time against that total grace period.
    timeoutSeconds: 40

  # Grace period for pod shutdown. Needs to accommodate the preStop
  # CLUSTER FAILOVER handshake (default timeoutSeconds: 40) with headroom
  # for SIGTERM + flush. The K8s default (30s) is too short for an orderly
  # cluster rollout — a clipped preStop forces the abrupt close this
  # feature is trying to avoid.
  terminationGracePeriodSeconds: 60

  # Isolate this Valkey cluster's gossip bus from any other release in the
  # Kubernetes cluster. Valkey's CLUSTER MEET has no authentication, so
  # without this, any pod that can open a TCP connection to a node's bus
  # port can merge its owner's cluster into this one — regardless of
  # namespace, since pod-to-pod traffic crosses namespaces freely by
  # default.
  #
  # The generated NetworkPolicy restricts the bus port to same-release pods
  # only; client and metrics ports remain open.
  #
  # Requires a NetworkPolicy-enforcing CNI (Calico, Cilium, kindnet ≥ 0.20,
  # Antrea, etc.). On a non-enforcing CNI (plain Flannel, in-tree kubenet)
  # the rendered policy is a no-op and the chart cannot provide isolation
  # on its own — an Istio AuthorizationPolicy or a separate Kubernetes
  # cluster per Valkey cluster is the only remaining option. Namespaces
  # alone do NOT provide isolation.
  isolation:
    enabled: true

  # PersistentVolumeClaim retention policy for StatefulSet
  # Controls when PVCs are deleted (requires Kubernetes 1.23+)
  # More info: https://kubernetes.io/docs/concepts/workloads/controllers/statefulset/#persistentvolumeclaim-retention
  persistentVolumeClaimRetentionPolicy: {}

  # Override surface for the cluster-init Job pod only. Layered on top of
  # the chart-wide podLabels / podAnnotations (these win on key collision)
  # and merged with the chart-computed mesh labels, so the same opt-out
  # mechanics that apply to the data pods are still in force unless you
  # explicitly veto a key here.
  #
  # The intended use case is excluding the short-lived bootstrap Job from
  # cluster-wide pod admission webhooks — observability sidecars, mesh
  # proxies pulled in by namespace labels, policy agents, etc. — that are
  # appropriate for long-running data pods but turn the Job into a
  # never-completing batch task. Because the Job is a Helm post-install
  # hook with backoffLimit=6, an injected sidecar that never exits means
  # `helm install --wait` blocks until timeout and the chart fails to
  # converge.
  #
  # Both maps default empty; with no overrides set the Job pod inherits
  # the chart-wide values exactly as it did before this surface existed.
  initJob:
    podLabels: {}
    podAnnotations: {}

tls:
  # Enable TLS
  enabled: false
  # Name of the Secret containing TLS keys (required)
  existingSecret: ""
  # Secret key name containing server public certificate
  serverPublicKey: server.crt
  # Secret key name containing server private key
  serverKey: server.key
  # Secret key name containing Certificate Authority public certificate
  caPublicKey: ca.crt
  # Secret key name containing DH parameters (optional)
  dhParamKey: ""
  # Require that clients authenticate with a certificate
  requireClientCertificate: false

istio:
  # Enable Istio
  enabled: false

  # Data-plane mode. Two very different shapes:
  #
  #   sidecar  — Classic Istio. An Envoy sidecar is injected into every pod.
  #              Requires the namespace/pod to be labelled for injection
  #              (`istio-injection=enabled` or `sidecar.istio.io/inject=true`).
  #              The chart adds `traffic.sidecar.istio.io/exclude*Ports` so
  #              the cluster-bus port bypasses Envoy (gossip needs raw TCP).
  #
  #   ambient  — Istio Ambient Mesh. No sidecar; a node-local ztunnel wraps
  #              pod traffic in HBONE mTLS transparently. The chart adds
  #              `istio.io/dataplane-mode: ambient` to every workload pod so
  #              ztunnel captures their traffic (also works when the whole
  #              namespace is labelled; the pod label is additive and lets
  #              operators opt in per-release). The DestinationRule that
  #              wraps outbound connections in ISTIO_MUTUAL is skipped —
  #              ztunnel already handles mTLS, and a DR would layer a second
  #              Envoy mTLS on top, doubling crypto overhead.
  #
  # Both modes still render the PeerAuthentication (enforced by ztunnel in
  # ambient, by Envoy in sidecar) and the chart's AuthorizationPolicy that
  # pins the cluster-bus port to same-release principals.
  mode: sidecar  # @schema enum:[sidecar,ambient]

  # SPIFFE trust domain this mesh issues identities under. Used by the
  # AuthorizationPolicy to build the principal string
  # `<trustDomain>/ns/<ns>/sa/<sa>`. Must match the `trustDomain` value in
  # the mesh ConfigMap (`kubectl -n istio-system get cm istio -o jsonpath=
  # '{.data.mesh}' | grep trustDomain`); a mismatch means the rule matches
  # nothing and same-release pods get default-denied on the bus port, not
  # just cross-release ones.
  trustDomain: cluster.local

  # PeerAuthentication controls mTLS enforcement on inbound connections.
  # Applies to both sidecar and ambient modes.
  #
  # A note on Prometheus scraping: STRICT requires every inbound connection
  # to present a mesh-issued mTLS cert. An out-of-mesh Prometheus (e.g. a
  # Prometheus running in a namespace without injection, or on a cluster
  # without Istio) cannot present such a cert, so scraping the metrics
  # service fails with "Connection reset by peer". Fix either by putting
  # the scraper in the mesh (ambient capture or sidecar injection), or by
  # setting this mode to PERMISSIVE so the mesh accepts plaintext too.
  # The chart's AuthorizationPolicy keeps 9121 wide open at the identity
  # layer regardless — PeerAuthentication is the gate that flips.
  peerAuthentication:
    # mTLS mode for inbound traffic (STRICT, PERMISSIVE, DISABLE, UNSET)
    # STRICT: Require mTLS on all ports
    # PERMISSIVE: Accept both plaintext and mTLS
    mode: STRICT
    # Additional labels for the PeerAuthentication resource
    labels: {}
    # Additional annotations for the PeerAuthentication resource
    annotations: {}

  # DestinationRule configures mTLS for outbound connections to Valkey services.
  # Rendered only when istio.mode is "sidecar" — in ambient mode, ztunnel
  # handles mTLS transparently and a DR would double-encrypt.
  destinationRule:
    # TLS mode for outbound traffic (DISABLE, SIMPLE, MUTUAL, ISTIO_MUTUAL)
    # ISTIO_MUTUAL: Use Istio-managed certificates for mTLS.
    # NOTE: When tls.enabled is true the Valkey pods already terminate TLS
    # themselves. Keeping mode=ISTIO_MUTUAL wraps app-level TLS in Envoy mTLS
    # (double encryption) and still works, but doubles crypto overhead. If you
    # only want mesh-level mTLS, set tls.enabled=false here and rely on Istio.
    # If you prefer app-level TLS only, set mode=DISABLE so Envoy passes the
    # TLS bytes through untouched.
    mode: ISTIO_MUTUAL
    # Additional labels for the DestinationRule resource
    labels: {}
    # Additional annotations for the DestinationRule resource
    annotations: {}

  # AuthorizationPolicy restricts the cluster-bus port to same-release
  # principals. In sidecar mode, Envoy enforces; in ambient mode, ztunnel
  # enforces. Unlike the NetworkPolicy (IP-based, requires a policy-enforcing
  # CNI), this is cryptographic — it requires the caller to hold a SPIFFE
  # identity matching the Valkey pods' ServiceAccount, so a pod in a different
  # release cannot forge the check even if it can open a TCP connection.
  #
  # Only active in cluster mode (no bus port otherwise).
  authorizationPolicy:
    # Enable the chart-owned AuthorizationPolicy.
    # Defaults to true when istio.enabled is true — the whole point of wiring
    # Istio in is to get mesh-level enforcement, and this is the piece that
    # prevents cross-release CLUSTER MEET attacks at L4.
    enabled: true
    # Additional labels for the AuthorizationPolicy resource
    labels: {}
    # Additional annotations for the AuthorizationPolicy resource
    annotations: {}

# Node selector for pod assignment
nodeSelector: {}

# Tolerations for pod assignment to tainted nodes
tolerations: []

# Affinity rules for pod scheduling
affinity: {}

# Set Deployment strategy. See https://kubernetes.io/docs/concepts/workloads/controllers/deployment/#strategy
deploymentStrategy: RollingUpdate # @schema enum:[RollingUpdate,Recreate]

# See https://kubernetes.io/docs/concepts/scheduling-eviction/topology-spread-constraints
topologySpreadConstraints: []

# PodDisruptionBudget configuration (only used in replicated mode)
# Helps keep enough replicas available during voluntary disruptions
podDisruptionBudget:
  # Enable PodDisruptionBudget
  enabled: false
  # Minimum number of pods that must be available (takes precedence over maxUnavailable if both set)
  minAvailable: null
  # Maximum number of pods that can be unavailable during disruptions
  maxUnavailable: 1
  # Unhealthy pod eviction policy (optional)
  # Valid values: IfHealthyBudget, AlwaysAllow
  unhealthyPodEvictionPolicy: ""

# Valkey logging level: debug, verbose, notice, warning
valkeyLogLevel: "notice"
# Environment variables to inject into Valkey container

env: {}
  # Example:
  # LOG_LEVEL: info

metrics:
  # Enable Prometheus exporter sidecar
  enabled: false
  # Exporter configuration
  exporter:
    # Command to run in the metrics exporter container (overrides args)
    command: []
    # Arguments to pass to the metrics exporter container
    args: []
      # Example:
      # - --redis.addr=redis:6379
    # Port on which the metrics exporter will listen
    port: 9121
    # Image configuration
    image:
      # Image registry
      registry: ghcr.io
      # Prometheus exporter container image repository
      repository: oliver006/redis_exporter
      # Image pull policy (Always, IfNotPresent, Never)
      pullPolicy: IfNotPresent
      # Image tag (leave empty to use latest)
      tag: "v1.79.0"
    resources: {}
      # Example:
      # limits:
      #   cpu: 100m
      #   memory: 128Mi
      # requests:
      #   cpu: 100m
      #   memory: 128Mi
    # Extra volume mounts for metrics exporter container
    extraVolumeMounts: []
    # Additional secrets to mount for metrics exporter
    extraExporterSecrets: []
    # Environment variables to inject into the metrics exporter container
    extraEnvs: {}
    # Example:
    # LOG_LEVEL: info
    securityContext: {}
      # Example:
      # runAsNonRoot: true
      # runAsUser: 1000
      # runAsGroup: 1000
      # capabilities:
      #   drop:
      #     - ALL
      # readOnlyRootFilesystem: true

  # Service configuration for the metrics exporter
  service:
    # Enable a separate service for the metrics exporter
    enabled: true
    # Service type (ClusterIP, NodePort, LoadBalancer)
    type: ClusterIP
    # Port on which the metrics exporter service will be exposed
    ports:
      http: 9121
    # Optional annotations for the metrics exporter service
    annotations: {}
    # Optional labels for the metrics exporter service
    extraLabels: {}
    # ServiceMonitor configuration for Prometheus Operator
    # Application protocol
    appProtocol: ""
  serviceMonitor:
    # Enable ServiceMonitor resource for scraping service metrics
    enabled: false
    # Port name or number to scrape metrics from
    port: metrics
    # Extra labels for the ServiceMonitor resource
    extraLabels: {}
    # Extra annotations for the ServiceMonitor resource
    annotations: {}
    # How often Prometheus should scrape metrics
    interval: 30s
    # Maximum duration allowed for a scrape request
    scrapeTimeout: ""
    # Relabeling rules applied before scraping metrics
    relabelings: []
    # Relabeling rules applied before ingesting metrics
    metricRelabelings: []
    # Set honorLabels to true to preserve original metric labels
    honorLabels: false
    # Extra labels to help Prometheus discover ServiceMonitor resources
    additionalLabels: {}
    # Pod labels to copy onto the generated metrics
    podTargetLabels: []
    # Maximum number of samples to collect per Pod scrape
    sampleLimit: false
    # Maximum number of scrape targets allowed
    targetLimit: false
  podMonitor:
    # Enable PodMonitor resource for scraping pod metrics
    enabled: false
    # Port name or number to scrape metrics from
    port: metrics
    # Extra labels for the ServiceMonitor resource
    extraLabels: {}
    # Extra annotations for the ServiceMonitor resource
    annotations: {}
    # Frequency for Prometheus to scrape pod metrics
    interval: 30s
    # Time limit for each scrape operation
    scrapeTimeout: ""
    # Relabeling rules to apply before scraping pod metrics
    relabelings: []
    # Relabeling rules to apply before ingesting pod metrics
    metricRelabelings: []
    # If true, keeps original labels from the pod metrics
    honorLabels: false
    # Additional labels for Prometheus to find PodMonitor resources
    additionalLabels: {}
    # Pod labels to attach to the metrics
    podTargetLabels: []
    # Maximum samples to scrape from each Pod
    sampleLimit: false
    # Maximum number of pods to scrape
    targetLimit: false

  # PrometheusRule configuration for alerting rules (used by kube-prometheus-stack)
  prometheusRule:
    # Enable creation of PrometheusRule resource
    enabled: false
    # Extra labels to add to the PrometheusRule resource
    extraLabels: {}
    # Extra annotations to add to the PrometheusRule resource
    extraAnnotations: {}
    # List of Prometheus alerting rules
    rules: []
    # Example alerting rules:
    # - alert: ValkeyDown
    #   annotations:
    #     summary: Valkey instance {{ "{{ $labels.instance }}" }} down
    #     description: Valkey instance {{ "{{ $labels.instance }}" }} is down.
    #   expr: |
    #     redis_up{service="{{ include "valkey.fullname" . }}-metrics"} == 0
    #   for: 2m
    #   labels:
    #     severity: error
    # - alert: ValkeyMemoryHigh
    #   annotations:
    #     summary: Valkey instance {{ "{{ $labels.instance }}" }} is using too much memory
    #     description: |
    #        Valkey instance {{ "{{ $labels.instance }}" }} is using {{ "{{ $value }}" }}% of its available memory.
    #   expr: |
    #      redis_memory_used_bytes{service="{{ include "valkey.fullname" . }}-metrics"} * 100
    #      /
    #      redis_memory_max_bytes{service="{{ include "valkey.fullname" . }}-metrics"}
    #      > 90 <= 100
    #   for: 2m
    #   labels:
    #     severity: error
    # - alert: ValkeyKeyEviction
    #   annotations:
    #     summary: Valkey instance {{ "{{ $labels.instance }}" }} has evicted keys
    #     description: |
    #        Valkey instance {{ "{{ $labels.instance }}" }} has evicted {{ "{{ $value }}" }} keys in the last 5 minutes.
    #   expr: |
    #     increase(redis_evicted_keys_total{service="{{ include "valkey.fullname" . }}-metrics"}[5m]) > 0
    #   for: 1s
    #   labels:
    #     severity: error
