apiVersion: valkey.io/v1alpha1
kind: ValkeyCluster
metadata:
  name: {{ include "valkey-resources.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "valkey-resources.labels" . | nindent 4 }}
    {{- with .Values.labels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
  {{- with .Values.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  {{- toYaml .Values.spec | nindent 2 }}
