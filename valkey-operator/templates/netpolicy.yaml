{{- with .Values.networkPolicy }}
{{- $useDefaults := true }}
{{- if hasKey . "defaultEgressRules" }}
{{- $useDefaults = .defaultEgressRules }}
{{- end }}
{{- $valkeyPort := .valkeyPort | default 6379 }}
{{- $apiServerPort := .apiServerPort | default 6443 }}
{{- $dnsNamespace := .dnsNamespace | default "kube-system" }}
{{- $watch := $.Values.manager.watchNamespaces }}
{{- $hasEgress := or .egress $useDefaults }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "valkey-operator.fullname" $ }}
  namespace: {{ $.Release.Namespace }}
  labels:
    {{- include "valkey-operator.labels" $ | nindent 4 }}
    {{- with .labels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
  {{- with .annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  podSelector:
    matchLabels:
      {{- include "valkey-operator.selectorLabels" $ | nindent 6 }}
  policyTypes:
  {{- if .ingress }}
    - Ingress
  {{- end }}
  {{- if $hasEgress }}
    - Egress
  {{- end }}
  {{- with .ingress }}
  ingress:
    {{- tpl (toYaml .) $ | nindent 4 }}
  {{- end }}
  {{- if $hasEgress }}
  egress:
    {{- if $useDefaults }}
    # DNS resolution (kube-dns / CoreDNS)
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ $dnsNamespace }}
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    # Kubernetes API server
    - to:
        - ipBlock:
            cidr: 0.0.0.0/0
      ports:
        - protocol: TCP
          port: {{ $apiServerPort }}
    # Managed Valkey pods on the Valkey port
    - to:
        {{- if $watch }}
        {{- range $watch }}
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ . }}
        {{- end }}
        {{- else }}
        - namespaceSelector: {}
        {{- end }}
      ports:
        - protocol: TCP
          port: {{ $valkeyPort }}
    {{- end }}
    {{- with .egress }}
    {{- tpl (toYaml .) $ | nindent 4 }}
    {{- end }}
  {{- end }}
{{- end }}
