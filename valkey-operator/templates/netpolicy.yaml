{{- with .Values.networkPolicy }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "valkey-operator.fullname" $ }}
  namespace: {{ $.Release.Namespace }}
  labels:
    {{- include "valkey-operator.labels" $ | nindent 4 }}
    {{- with .labels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
  {{- with .annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  podSelector:
    matchLabels:
      {{- include "valkey-operator.selectorLabels" $ | nindent 6 }}
      control-plane: controller-manager
  policyTypes:
  {{- if .ingress }}
    - Ingress
  {{- end }}
  {{- if .egress }}
    - Egress
  {{- end }}
  {{- with .ingress }}
  ingress:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  {{- with .egress }}
  egress:
    {{- toYaml . | nindent 4 }}
  {{- end }}
{{- end }}
