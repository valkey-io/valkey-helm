suite: ServiceAccount configuration
templates:
  - templates/serviceaccount.yaml
set:
  fullnameOverride: ""
  existingSecret: ""
tests:
  - it: should create ServiceAccount by default
    asserts:
      - hasDocuments:
          count: 1
      - isKind:
          of: ServiceAccount

  - it: should not create ServiceAccount when serviceAccount.create is false
    set:
      serviceAccount.create: false
    asserts:
      - hasDocuments:
          count: 0

  - it: should default name to release fullname
    asserts:
      - equal:
          path: metadata.name
          value: RELEASE-NAME-valkey-cluster

  - it: should honor custom serviceAccount.name when set
    set:
      serviceAccount.name: custom-sa
    asserts:
      - equal:
          path: metadata.name
          value: custom-sa

  - it: should respect fullnameOverride in ServiceAccount name
    set:
      fullnameOverride: my-valkey-cluster
    asserts:
      - equal:
          path: metadata.name
          value: my-valkey-cluster

  - it: should default automountServiceAccountToken to false
    asserts:
      - equal:
          path: automountServiceAccountToken
          value: false

  - it: should set automountServiceAccountToken true when configured
    set:
      serviceAccount.automount: true
    asserts:
      - equal:
          path: automountServiceAccountToken
          value: true

  - it: should not render annotations block when serviceAccount.annotations is empty
    asserts:
      - notExists:
          path: metadata.annotations

  - it: should render annotations when serviceAccount.annotations is set
    set:
      serviceAccount.annotations:
        eks.amazonaws.com/role-arn: arn:aws:iam::123456789012:role/my-role
    asserts:
      - equal:
          path: metadata.annotations["eks.amazonaws.com/role-arn"]
          value: arn:aws:iam::123456789012:role/my-role

  - it: should include standard labels
    asserts:
      - equal:
          path: metadata.labels["app.kubernetes.io/name"]
          value: valkey-cluster
      - equal:
          path: metadata.labels["app.kubernetes.io/instance"]
          value: RELEASE-NAME
      - equal:
          path: metadata.labels["app.kubernetes.io/managed-by"]
          value: Helm
      - isNotNull:
          path: metadata.labels["helm.sh/chart"]
